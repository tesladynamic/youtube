<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Mini Client - Gelişmiş</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #0f0f0f;
  color: white;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

header {
  padding: 16px 24px;
  display: flex;
  gap: 16px;
  align-items: center;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 28px;
  font-weight: 700;
  color: #ff0000;
  min-width: 120px;
  cursor: pointer;
}

.search {
  position: relative;
  flex: 1;
  max-width: 600px;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  height: 44px;
  background: #121212;
  border: 1px solid #333;
  border-radius: 22px;
  padding: 0 20px;
  font-size: 16px;
  color: white;
  outline: none;
}

input:focus {
  border-color: #1c62b9;
}

button {
  height: 44px;
  padding: 0 20px;
  border: none;
  border-radius: 22px;
  background: #cc0000;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

button:hover {
  background: #ff0000;
}

#suggestions {
  position: absolute;
  top: 50px;
  left: 0;
  right: 0;
  background: #212121;
  border: 1px solid #333;
  border-radius: 12px;
  overflow: hidden;
  z-index: 9999;
  display: none;
  max-height: 350px;
  overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,.6);
}

.suggestion-section-title {
  padding: 8px 18px;
  font-size: 12px;
  color: #aaa;
  background: #1a1a1a;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.clear-history {
  color: #3ea6ff;
  cursor: pointer;
  font-size: 11px;
}

.clear-history:hover {
  text-decoration: underline;
}

.suggestion {
  padding: 10px 18px;
  cursor: pointer;
  font-size: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #2a2a2a;
}

.suggestion:hover,
.suggestion.active {
  background: #383838;
}

.delete-item {
  color: #aaa;
  font-size: 13px;
  padding: 2px 6px;
}

.delete-item:hover {
  color: #ff4444;
}

.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.sidebar {
  width: 380px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #222;
  background: #0f0f0f;
}

.tabs {
  display: flex;
  border-bottom: 1px solid #222;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: #aaa;
  background: #121212;
  transition: all 0.2s;
}

.tab.active {
  color: white;
  background: #0f0f0f;
  border-bottom: 2px solid #ff0000;
}

.results-container {
  flex: 1;
  overflow-y: auto;
}

.video-item {
  display: flex;
  gap: 12px;
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #1f1f1f;
  transition: background 0.2s;
}

.video-item:hover {
  background: #272727;
}

.video-item img {
  width: 140px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}

.video-info {
  flex: 1;
  font-size: 13px;
  line-height: 1.4;
  overflow: hidden;
}

.video-title {
  font-weight: 600;
  color: #f1f1f1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.channel-title {
  color: #aaa;
  margin-top: 6px;
  font-size: 12px;
}

.player {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="location.reload()">YouTube</div>
  <div class="search">
    <input id="query" placeholder="YouTube'da ara..." autocomplete="off">
    <button onclick="searchVideos()">Ara</button>
    <div id="suggestions"></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('results')" id="tab-results">Arama Sonuçları</div>
      <div class="tab" onclick="switchTab('history')" id="tab-history">Son İzlenenler</div>
    </div>
    
    <div class="results-container" id="results-pane">
      <div id="results"></div>
    </div>
    
    <div class="results-container" id="history-pane" style="display: none;">
      <div id="watch-history"></div>
    </div>
  </div>

  <div class="player">
    <iframe id="player" src="https://www.youtube.com/embed/jfKfPfyJRdk" allowfullscreen></iframe>
  </div>
</div>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY"; // Kendi API anahtarınızı buraya yazın

let currentResults = [];
let watchHistory = JSON.parse(localStorage.getItem("yt_watch_history")) || [];
let searchHistory = JSON.parse(localStorage.getItem("yt_search_history")) || [];

function decodeHTMLEntities(text) {
  const textArea = document.createElement('textarea');
  textArea.innerHTML = text;
  return textArea.value;
}

function switchTab(tabName) {
  document.getElementById("tab-results").classList.remove("active");
  document.getElementById("tab-history").classList.remove("active");
  document.getElementById("results-pane").style.display = "none";
  document.getElementById("history-pane").style.display = "none";

  if (tabName === 'results') {
    document.getElementById("tab-results").classList.add("active");
    document.getElementById("results-pane").style.display = "block";
  } else {
    document.getElementById("tab-history").classList.add("active");
    document.getElementById("history-pane").style.display = "block";
    renderWatchHistory();
  }
}

async function searchVideos(customQuery) {
  const queryInput = document.getElementById("query");
  const suggestionsBox = document.getElementById("suggestions");
  const q = customQuery || queryInput.value.trim();

  if (!q) return;

  queryInput.value = q;
  suggestionsBox.style.display = "none";
  switchTab('results');

  // Arama geçmişine ekle (Tekrarları önle, en başa koy)
  if (!searchHistory.includes(q)) {
    searchHistory.unshift(q);
    if (searchHistory.length > 10) searchHistory.pop(); // Max 10 kayıt
    localStorage.setItem("yt_search_history", JSON.stringify(searchHistory));
  }

  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=25&q=${encodeURIComponent(q)}&key=${API_KEY}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!data.items) {
      alert("Arama sonucu bulunamadı veya API kotası doldu.");
      return;
    }

    currentResults = data.items;
    renderVideoList(currentResults, "results");

  } catch (err) {
    console.error(err);
    alert("Bağlantı hatası oluştu.");
  }
}

function renderVideoList(items, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  items.forEach(video => {
    // API'den gelen veya geçmişten gelen yapı farkını normalize et
    const videoId = video.id?.videoId || video.videoId;
    const title = decodeHTMLEntities(video.snippet.title);
    const channel = decodeHTMLEntities(video.snippet.channelTitle);
    const thumb = video.snippet.thumbnails.medium.url;

    const div = document.createElement("div");
    div.className = "video-item";
    div.innerHTML = `
      <img src="${thumb}" alt="thumbnail">
      <div class="video-info">
        <div class="video-title"></div>
        <div class="channel-title"></div>
      </div>
    `;

    div.querySelector(".video-title").textContent = title;
    div.querySelector(".channel-title").textContent = channel;

    div.onclick = () => {
      playVideo({ videoId, snippet: { title, channelTitle: channel, thumbnails: { medium: { url: thumb } } } });
    };

    container.appendChild(div);
  });
}

function playVideo(videoObj) {
  const videoId = videoObj.videoId;
  document.getElementById("player").src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;

  // İzleme geçmişine ekle
  watchHistory = watchHistory.filter(item => item.videoId !== videoId); // Varsa öncekini kaldır
  watchHistory.unshift(videoObj);
  if (watchHistory.length > 20) watchHistory.pop(); // Max 20 kayıt
  localStorage.setItem("yt_watch_history", JSON.stringify(watchHistory));
}

function renderWatchHistory() {
  const container = document.getElementById("watch-history");
  if (watchHistory.length === 0) {
    container.innerHTML = `<div style="padding: 20px; color: #888; text-align: center; font-size: 14px;">Henüz izlenen video yok.</div>`;
    return;
  }
  renderVideoList(watchHistory, "watch-history");
}

// Otomatik Tamamlama ve Geçmiş Yönetimi
const queryInput = document.getElementById("query");
const suggestionsBox = document.getElementById("suggestions");

queryInput.addEventListener("focus", () => {
  showSuggestionsDropdown(queryInput.value.trim());
});

queryInput.addEventListener("input", () => {
  showSuggestionsDropdown(queryInput.value.trim());
});

async function showSuggestionsDropdown(q) {
  suggestionsBox.innerHTML = "";
  let hasContent = false;

  // 1. Önce Arama Geçmişinden Eşleşenleri Göster
  const matchedHistory = searchHistory.filter(item => item.toLowerCase().includes(q.toLowerCase()));
  if (matchedHistory.length > 0) {
    hasContent = true;
    const titleDiv = document.createElement("div");
    titleDiv.className = "suggestion-section-title";
    titleDiv.innerHTML = `<span>Son Aramalar</span> <span class="clear-history" onclick="clearSearchHistory(event)">Tümünü Temizle</span>`;
    suggestionsBox.appendChild(titleDiv);

    matchedHistory.slice(0, 5).forEach(term => {
      const div = document.createElement("div");
      div.className = "suggestion";
      div.innerHTML = `<span>🔍 ${term}</span> <span class="delete-item" onclick="removeSearchItem(event, '${term}')">✕</span>`;
      
      div.onclick = (e) => {
        if (e.target.classList.contains('delete-item')) return;
        searchVideos(term);
      };
      suggestionsBox.appendChild(div);
    });
  }

  // 2. Canlı YouTube Önerileri (CORS Proxy ile)
  if (q.length >= 2) {
    try {
      const proxyUrl = "https://corsproxy.io/?";
      const targetUrl = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(q)}`;
      const res = await fetch(proxyUrl + encodeURIComponent(targetUrl));
      const data = await res.json();

      if (data[1] && data[1].length > 0) {
        hasContent = true;
        const liveTitleDiv = document.createElement("div");
        liveTitleDiv.className = "suggestion-section-title";
        liveTitleDiv.textContent = "Google Önerileri";
        suggestionsBox.appendChild(liveTitleDiv);

        data[1].slice(0, 5).forEach(item => {
          const div = document.createElement("div");
          div.className = "suggestion";
          div.textContent = item;
          div.onclick = () => searchVideos(item);
          suggestionsBox.appendChild(div);
        });
      }
    } catch (err) {
      console.log("Öneri çekilemedi", err);
    }
  }

  suggestionsBox.style.display = hasContent ? "block" : "none";
}

function clearSearchHistory(e) {
  e.stopPropagation();
  searchHistory = [];
  localStorage.removeItem("yt_search_history");
  suggestionsBox.style.display = "none";
}

function removeSearchItem(e, term) {
  e.stopPropagation();
  searchHistory = searchHistory.filter(item => item !== term);
  localStorage.setItem("yt_search_history", JSON.stringify(searchHistory));
  showSuggestionsDropdown(queryInput.value.trim());
}

queryInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    suggestionsBox.style.display = "none";
    searchVideos();
  }
});

document.addEventListener("click", e => {
  if (!suggestionsBox.contains(e.target) && e.target !== queryInput) {
    suggestionsBox.style.display = "none";
  }
});
</script>

</body>
</html>
