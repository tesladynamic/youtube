<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla YouTube Test</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }
        .header {
            padding: 15px 20px;
            background-color: #202020;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .player-area {
            flex: 1;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Tesla YouTube Deneme Paneli</div>
        <div class="player-area">
            <!-- Doğrudan YouTube'un oynatıcı altyapısını tam ekran çağırıyoruz -->
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UCBR8-60-B28hp2BmDPdntcQ&autoplay=1" 
                    title="YouTube Player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>
</body>
</html>
