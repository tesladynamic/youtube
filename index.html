<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveHub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#000;
    color:#fff;
    height:100vh;
    overflow:hidden;
}

.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
}

.clock{
    font-size:22px;
    opacity:.8;
}

.container{
    height:calc(100vh - 70px);
    display:flex;
    flex-direction:column;
    padding:25px;
    gap:20px;
}

.search{
    display:flex;
    gap:15px;
}

input{
    flex:1;
    height:60px;
    border:none;
    border-radius:14px;
    background:#111;
    color:#fff;
    padding:0 20px;
    font-size:20px;
}

button{
    height:60px;
    padding:0 30px;
    border:none;
    border-radius:14px;
    background:#fff;
    color:#000;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.player{
    flex:1;
    background:#111;
    border-radius:20px;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

.quick{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.card{
    background:#111;
    border-radius:16px;
    padding:20px;
    text-align:center;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    background:#1b1b1b;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">DRIVEHUB</div>
    <div class="clock" id="clock"></div>
</div>

<div class="container">

    <div class="search">
        <input id="youtubeUrl" placeholder="YouTube linkini yapıştır">
        <button onclick="playVideo()">Oynat</button>
    </div>

    <div class="quick">
        <div class="card" onclick="openSite('https://youtube.com')">YouTube</div>
        <div class="card" onclick="openSite('https://music.youtube.com')">Music</div>
        <div class="card" onclick="openSite('https://maps.google.com')">Maps</div>
        <div class="card" onclick="location.reload()">Yenile</div>
    </div>

    <div class="player">
        <iframe id="player"
        src="https://www.youtube.com/embed/jfKfPfyJRdk">
        </iframe>
    </div>

</div>

<script>

function updateClock(){
    const now = new Date();
    document.getElementById('clock').innerText =
        now.toLocaleTimeString('tr-TR',{
            hour:'2-digit',
            minute:'2-digit'
        });
}

setInterval(updateClock,1000);
updateClock();

function playVideo(){

    const url = document.getElementById('youtubeUrl').value.trim();

    let videoId = "";

    if(url.includes("watch?v=")){
        videoId = url.split("watch?v=")[1].split("&")[0];
    }
    else if(url.includes("youtu.be/")){
        videoId = url.split("youtu.be/")[1].split("?")[0];
    }

    if(videoId){
        document.getElementById("player").src =
        "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
    }
    else{
        alert("Geçerli bir YouTube linki gir.");
    }
}

function openSite(url){
    window.open(url,"_blank");
}

</script>

</body>
</html>
