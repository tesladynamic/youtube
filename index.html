<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Yönlendirici</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .redirect-box {
            padding: 20px;
        }
        h2 {
            margin-bottom: 15px;
            font-weight: 400;
        }
        a {
            display: inline-block;
            background-color: #ff0000;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="redirect-box">
        <h2>YouTube Ana Sayfasına Yönlendiriliyorsunuz...</h2>
        <a href="https://www.youtube.com">Hemen Git</a>
    </div>

    <script>
        // Sayfa açıldığı an otomatik olarak YouTube ana sayfasına yönlendirir
        window.location.href = "https://www.youtube.com";
    </script>
</body>
</html>
