<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tesla YouTube Bypass</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: #0f0f0f;
  color: white;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

header {
  padding: 12px 20px;
  display: flex;
  gap: 16px;
  align-items: center;
  border-bottom: 1px solid #222;
  background: #0f0f0f;
  z-index: 10;
}

.logo {
  font-size: 24px;
  font-weight: 700;
  color: #ff0000;
  cursor: pointer;
}

.search {
  position: relative;
  flex: 1;
  max-width: 600px;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  height: 44px;
  background: #121212;
  border: 1px solid #333;
  border-radius: 22px;
  padding: 0 20px;
  font-size: 16px;
  color: white;
  outline: none;
}

button {
  height: 44px;
  padding: 0 20px;
  border: none;
  border-radius: 22px;
  background: #cc0000;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

#suggestions {
  position: absolute;
  top: 50px;
  left: 0;
  right: 0;
  background: #212121;
  border: 1px solid #333;
  border-radius: 12px;
  overflow: hidden;
  z-index: 9999;
  display: none;
  max-height: 300px;
  overflow-y: auto;
}

.suggestion {
  padding: 12px 18px;
  cursor: pointer;
  font-size: 15px;
  border-bottom: 1px solid #2a2a2a;
}

.suggestion:hover {
  background: #383838;
}

.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.sidebar {
  width: 360px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #222;
  background: #0f0f0f;
}

.tabs {
  display: flex;
  border-bottom: 1px solid #222;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: #aaa;
  background: #121212;
}

.tab.active {
  color: white;
  background: #0f0f0f;
  border-bottom: 2px solid #ff0000;
}

.results-container {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.video-item {
  display: flex;
  gap: 12px;
  padding: 10px 12px;
  cursor: pointer;
  border-bottom: 1px solid #1f1f1f;
  align-items: center;
}

.video-item:active {
  background: #272727;
}

.video-item img {
  width: 120px;
  height: 68px;
  object-fit: cover;
  border-radius: 6px;
}

.video-info {
  flex: 1;
  font-size: 13px;
  line-height: 1.3;
  overflow: hidden;
}

.video-title {
  font-weight: 600;
  color: #f1f1f1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.channel-title {
  color: #aaa;
  margin-top: 4px;
  font-size: 11px;
}

.player {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  position: relative;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="location.reload()">YouTube</div>
  <div class="search">
    <input id="query" placeholder="Ara..." autocomplete="off">
    <button onclick="searchVideos()">Ara</button>
    <div id="suggestions"></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('results')" id="tab-results">Sonuçlar</div>
      <div class="tab" onclick="switchTab('history')" id="tab-history">Geçmiş</div>
    </div>
    <div class="results-container" id="results-pane">
      <div id="results"></div>
    </div>
    <div class="results-container" id="history-pane" style="display: none;">
      <div id="watch-history"></div>
    </div>
  </div>

  <div class="player" id="player-container">
    <iframe id="player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script>
const API_KEY = "AIzaSyAMb6gkk8f7m7nbAFZQXeTMiZs0qSZcqbM"; // API anahtarınızı buraya yazın

let currentResults = [];
let watchHistory = JSON.parse(localStorage.getItem("yt_watch_history")) || [];
let searchHistory = JSON.parse(localStorage.getItem("yt_search_history")) || [];

function decodeHTMLEntities(text) {
  const textArea = document.createElement('textarea');
  textArea.innerHTML = text;
  return textArea.value;
}

function switchTab(tabName) {
  document.getElementById("tab-results").classList.remove("active");
  document.getElementById("tab-history").classList.remove("active");
  document.getElementById("results-pane").style.display = "none";
  document.getElementById("history-pane").style.display = "none";

  if (tabName === 'results') {
    document.getElementById("tab-results").classList.add("active");
    document.getElementById("results-pane").style.display = "block";
  } else {
    document.getElementById("tab-history").classList.add("active");
    document.getElementById("history-pane").style.display = "block";
    renderWatchHistory();
  }
}

async function searchVideos(customQuery) {
  const queryInput = document.getElementById("query");
  const suggestionsBox = document.getElementById("suggestions");
  const q = customQuery || queryInput.value.trim();

  if (!q) return;

  queryInput.value = q;
  suggestionsBox.style.display = "none";
  switchTab('results');

  if (!searchHistory.includes(q)) {
    searchHistory.unshift(q);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem("yt_search_history", JSON.stringify(searchHistory));
  }

  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&maxResults=25&q=${encodeURIComponent(q)}&key=${API_KEY}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
      alert("Video bulunamadı.");
      return;
    }

    currentResults = data.items;
    renderVideoList(currentResults, "results");

    if (currentResults.length > 0) {
      playVideo(currentResults[0]);
    }
  } catch (err) {
    console.error(err);
  }
}

function renderVideoList(items, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  items.forEach(video => {
    const videoId = video.id?.videoId || video.videoId;
    const title = decodeHTMLEntities(video.snippet.title);
    const channel = decodeHTMLEntities(video.snippet.channelTitle);
    const thumb = video.snippet.thumbnails.medium.url;

    const div = document.createElement("div");
    div.className = "video-item";
    div.innerHTML = `
      <img src="${thumb}" alt="">
      <div class="video-info">
        <div class="video-title"></div>
        <div class="channel-title"></div>
      </div>
    `;

    div.querySelector(".video-title").textContent = title;
    div.querySelector(".channel-title").textContent = channel;

    div.onclick = () => {
      playVideo({ videoId, snippet: { title, channelTitle: channel, thumbnails: { medium: { url: thumb } } } });
    };

    container.appendChild(div);
  });
}

function playVideo(videoObj) {
  const videoId = videoObj.videoId || videoObj.id?.videoId;
  if (!videoId) return;

  const playerContainer = document.getElementById("player-container");
  
  // Tesla tarayıcısının hareket sensörünü ve iframe element engellemesini 
  // DOM elementini yeniden oluşturarak (re-inject) bypass ediyoruz.
  playerContainer.innerHTML = `
    <iframe id="player" 
      src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&playsinline=1&enablejsapi=1&controls=1&modestbranding=1" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    3</iframe>
  `;

  watchHistory = watchHistory.filter(item => (item.videoId || item.id?.videoId) !== videoId);
  watchHistory.unshift(videoObj);
  if (watchHistory.length > 20) watchHistory.pop();
  localStorage.setItem("yt_search_history", JSON.stringify(watchHistory));
}

function renderWatchHistory() {
  const container = document.getElementById("watch-history");
  if (watchHistory.length === 0) {
    container.innerHTML = `<div style="padding: 20px; color: #888; text-align: center; font-size: 14px;">Geçmiş boş.</div>`;
    return;
  }
  renderVideoList(watchHistory, "watch-history");
}

const queryInput = document.getElementById("query");
const suggestionsBox = document.getElementById("suggestions");

queryInput.addEventListener("input", async () => {
  const q = queryInput.value.trim();
  if (q.length < 2) {
    suggestionsBox.style.display = "none";
    return;
  }

  try {
    const proxyUrl = "https://corsproxy.io/?";
    const targetUrl = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(q)}`;
    const res = await fetch(proxyUrl + encodeURIComponent(targetUrl));
    const data = await res.json();

    suggestionsBox.innerHTML = "";
    if (data[1] && data[1].length > 0) {
      data[1].slice(0, 6).forEach(item => {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.textContent = item;
        div.onclick = () => {
          queryInput.value = item;
          suggestionsBox.style.display = "none";
          searchVideos(item);
        };
        suggestionsBox.appendChild(div);
      });
      suggestionsBox.style.display = "block";
    }
  } catch (err) {
    console.log(err);
  }
});

queryInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    suggestionsBox.style.display = "none";
    searchVideos();
  }
});

document.addEventListener("click", e => {
  if (!suggestionsBox.contains(e.target) && e.target !== queryInput) {
    suggestionsBox.style.display = "none";
  }
});
</script>

</body>
</html>
