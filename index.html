<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#0f0f0f;
color:white;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
}

header{
padding:20px;
display:flex;
gap:12px;
align-items:center;
border-bottom:1px solid #222;
}

.logo{
font-size:34px;
font-weight:700;
color:#ff0000;
min-width:140px;
}

.search{
position:relative;
flex:1;
display:flex;
gap:10px;
}

input{
flex:1;
height:52px;
background:#181818;
border:1px solid #333;
border-radius:30px;
padding:0 20px;
font-size:18px;
color:white;
}

button{
height:52px;
padding:0 24px;
border:none;
border-radius:30px;
background:#ff0000;
color:white;
font-size:18px;
cursor:pointer;
}

#suggestions{
position:absolute;
top:58px;
left:0;
right:110px;
background:#181818;
border:1px solid #333;
border-radius:16px;
overflow:hidden;
z-index:9999;
display:none;
max-height:320px;
overflow-y:auto;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.suggestion{
padding:14px 18px;
cursor:pointer;
font-size:16px;
border-bottom:1px solid #222;
}

.suggestion:hover,
.suggestion.active{
background:#2a2a2a;
}

.main{
flex:1;
display:flex;
overflow:hidden;
}

.results{
width:420px;
overflow-y:auto;
border-right:1px solid #222;
}

.video-item{
display:flex;
gap:12px;
padding:12px;
cursor:pointer;
border-bottom:1px solid #1b1b1b;
}

.video-item:hover{
background:#1a1a1a;
}

.video-item img{
width:160px;
border-radius:10px;
}

.video-info{
font-size:14px;
line-height:1.4;
}

.player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

iframe{
width:100%;
height:100%;
border:none;
}
</style>
</head>
<body>

<header>
<div class="logo">YouTube</div>

<div class="search">
<input id="query" placeholder="YouTube'da ara...">
<button onclick="searchVideos()">Ara</button>
<div id="suggestions"></div>
</div>

</header>

<div class="main">

<div class="results" id="results">
</div>

<div class="player">
<iframe
id="player"
src="https://www.youtube.com/embed/jfKfPfyJRdk">
</iframe>
</div>

</div>

<script>

const API_KEY = "AIzaSyAMb6gkk8f7m7nbAFZQXeTMiZs0qSZcqbM";

async function searchVideos(){

const q = document.getElementById("query").value.trim();

if(!q) return;

const url =
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=25&q=${encodeURIComponent(q)}&key=${API_KEY}`;

try{

const res = await fetch(url);
const data = await res.json();

const results = document.getElementById("results");
results.innerHTML = "";

data.items.forEach(video=>{

const videoId = video.id.videoId;

const div = document.createElement("div");
div.className = "video-item";

div.innerHTML = `
<img src="${video.snippet.thumbnails.medium.url}">
<div class="video-info">
<div><b>${video.snippet.title}</b></div>
<div style="opacity:.7;margin-top:6px;">
${video.snippet.channelTitle}
</div>
</div>
`;

div.onclick = ()=>{
document.getElementById("player").src =
`https://www.youtube.com/embed/${videoId}?autoplay=1`;
};

results.appendChild(div);

});

}catch(err){

console.error(err);
alert("YouTube API hatası");

}

}

const queryInput = document.getElementById("query");
const suggestionsBox = document.getElementById("suggestions");

let selectedSuggestion = -1;

queryInput.addEventListener("input", async () => {

const q = queryInput.value.trim();

if(q.length < 2){
suggestionsBox.style.display = "none";
return;
}

try{

const url =
"https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=" +
encodeURIComponent(q);

const res = await fetch(url);
const data = await res.json();

suggestionsBox.innerHTML = "";
selectedSuggestion = -1;

data[1].slice(0,8).forEach(item => {

const div = document.createElement("div");
div.className = "suggestion";
div.textContent = item;

div.onclick = () => {
queryInput.value = item;
suggestionsBox.style.display = "none";
searchVideos();
};

suggestionsBox.appendChild(div);

});

suggestionsBox.style.display =
data[1].length ? "block" : "none";

}catch(err){
console.log(err);
}

});

queryInput.addEventListener("keydown", e => {

const items = document.querySelectorAll(".suggestion");

if(e.key === "Enter" && selectedSuggestion < 0){
searchVideos();
return;
}

if(!items.length) return;

if(e.key === "ArrowDown"){
e.preventDefault();
selectedSuggestion =
Math.min(selectedSuggestion + 1, items.length - 1);
}

if(e.key === "ArrowUp"){
e.preventDefault();
selectedSuggestion =
Math.max(selectedSuggestion - 1, 0);
}

items.forEach(i => i.classList.remove("active"));

if(selectedSuggestion >= 0){
items[selectedSuggestion].classList.add("active");
}

if(e.key === "Enter" && selectedSuggestion >= 0){

e.preventDefault();

queryInput.value =
items[selectedSuggestion].textContent;

suggestionsBox.style.display = "none";

searchVideos();
}
});

document.addEventListener("click", e => {

if(!suggestionsBox.contains(e.target)
&& e.target !== queryInput){

suggestionsBox.style.display = "none";
}

});

</script>

</body>
</html>
