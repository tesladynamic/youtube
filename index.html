<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla YouTube Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .sidebar {
            width: 380px;
            background-color: #121212;
            border-right: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }
        .sidebar-title {
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 1px solid #282828;
        }
        .video-list {
            overflow-y: auto;
            flex: 1;
        }
        .video-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #1a1a1a;
        }
        .video-item:hover, .video-item.active {
            background-color: #272727;
        }
        .video-item img {
            width: 120px;
            height: 68px;
            object-fit: cover;
            border-radius: 6px;
            margin-right: 12px;
        }
        .video-item span {
            font-size: 0.95rem;
            line-height: 1.3;
        }
        .player-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background-color: #000;
            justify-content: center;
            align-items: center;
        }
        .iframe-wrapper {
            width: 100%;
            height: 75vh;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-title {
            margin-top: 15px;
            font-size: 1.2rem;
            width: 100%;
            text-align: left;
            padding-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-title">Oynatma Listesi</div>
            <div class="video-list" id="videoList"></div>
        </div>

        <div class="player-container">
            <div class="iframe-wrapper">
                <iframe id="ytPlayer" src="" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-title" id="videoTitle">Bir video seçin</div>
        </div>
    </div>

    <script>
        const playlist = [
            {
                title: "Lofi Girl - Relaxing Beats",
                id: "jfKfPfyJRdk",
                thumb: "https://img.youtube.com/vi/jfKfPfyJRdk/hqdefault.jpg"
            },
            {
                title: "Synthwave Radio - Chill Beats",
                id: "4xDzrJKXOOY",
                thumb: "https://img.youtube.com/vi/4xDzrJKXOOY/hqdefault.jpg"
            },
            {
                title: "Classical Piano Music",
                id: "4Tr0otuiQuU",
                thumb: "https://img.youtube.com/vi/4Tr0otuiQuU/hqdefault.jpg"
            }
        ];

        const videoListEl = document.getElementById('videoList');
        const ytPlayer = document.getElementById('ytPlayer');
        const videoTitleEl = document.getElementById('videoTitle');

        function init() {
            videoListEl.innerHTML = '';
            
            playlist.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'video-item';
                if (index === 0) div.classList.add('active');

                div.innerHTML = `
                    <img src="${item.thumb}" alt="${item.title}">
                    <span>${item.title}</span>
                `;

                div.addEventListener('click', () => {
                    document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');

                    ytPlayer.src = `https://www.youtube.com/embed/${item.id}?autoplay=1`;
                    videoTitleEl.textContent = item.title;
                });

                videoListEl.appendChild(div);
            });

            if (playlist.length > 0) {
                ytPlayer.src = `https://www.youtube.com/embed/${playlist[0].id}?autoplay=1`;
                videoTitleEl.textContent = playlist[0].title;
            }
        }

        init();
    </script>
</body>
</html>
