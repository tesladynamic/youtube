<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla YouTube Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sol Taraf: Video Listesi -->
        <div class="sidebar">
            <div class="sidebar-title">Oynatma Listesi</div>
            <div class="video-list" id="videoList"></div>
        </div>

        <!-- Sağ Taraf: İçeride Oynatıcı Alanı -->
        <div class="player-container">
            <div class="iframe-wrapper">
                <iframe id="ytPlayer" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-title" id="videoTitle">Bir video seçin</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
