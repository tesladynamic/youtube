<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube for Tesla</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#000;
    color:#fff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:min(900px,90%);
    text-align:center;
}

.logo{
    font-size:72px;
    font-weight:700;
    margin-bottom:40px;
    color:#ff0000;
}

.search-box{
    display:flex;
    gap:15px;
}

input{
    flex:1;
    height:70px;
    border:none;
    border-radius:18px;
    background:#111;
    color:#fff;
    font-size:24px;
    padding:0 24px;
    outline:none;
}

button{
    width:180px;
    border:none;
    border-radius:18px;
    background:#ff0000;
    color:#fff;
    font-size:24px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.footer{
    margin-top:25px;
    opacity:.6;
    font-size:16px;
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">YouTube</div>

    <div class="search-box">
        <input
            id="searchInput"
            placeholder="YouTube'da ara..."
            autocomplete="off">
        <button onclick="searchYoutube()">Ara</button>
    </div>

    <div class="footer">
        Tesla Browser Uyumlu
    </div>

</div>

<script>

function searchYoutube(){
    const query =
        document.getElementById('searchInput')
        .value
        .trim();

    if(!query) return;

    const url =
        "https://www.youtube.com/results?search_query="
        + encodeURIComponent(query);

    window.location.href = url;
}

document
.getElementById("searchInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        searchYoutube();
    }
});

</script>

</body>
</html>
